<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stroke Prediction System</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; color: #333; margin: 0; padding: 40px; }
        .container { max-width: 650px; margin: 0 auto; background: #fff; padding: 40px; border-radius: 10px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 10px; }
        p.subtitle { text-align: center; color: #7f8c8d; margin-bottom: 30px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { display: flex; flex-direction: column; }
        label { font-weight: 600; margin-bottom: 8px; font-size: 14px; color: #34495e; }
        input, select { padding: 12px; border: 1px solid #ced4da; border-radius: 6px; font-size: 15px; outline: none; transition: border-color 0.3s; }
        input:focus, select:focus { border-color: #3498db; }
        .full-width { grid-column: span 2; }
        .btn-submit { background-color: #3498db; color: white; border: none; padding: 15px; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; transition: background-color 0.3s; width: 100%; }
        .btn-submit:hover { background-color: #2980b9; }
        .footer { text-align: center; margin-top: 30px; font-size: 14px; }
        .footer a { color: #333; text-decoration: none; font-weight: bold; }
        .footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <h1>Stroke Risk Predictor</h1>
    <p class="subtitle">Enter patient demographics and health metrics to predict stroke risk.</p>

    <form action="/predict" method="POST">
        <div class="form-grid">
            
            <div class="form-group">
                <label for="age">Age</label>
                <input type="number" step="0.1" name="age" id="age" required placeholder="e.g. 45">
            </div>

            <div class="form-group">
                <label for="gender">Gender</label>
                <select name="gender" id="gender" required>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label for="bmi">BMI</label>
                <input type="number" step="0.1" name="bmi" id="bmi" required placeholder="e.g. 28.5">
            </div>

            <div class="form-group">
                <label for="avg_glucose_level">Avg Glucose Level</label>
                <input type="number" step="0.1" name="avg_glucose_level" id="avg_glucose_level" required placeholder="e.g. 105.2">
            </div>

            <div class="form-group">
                <label for="hypertension">Hypertension</label>
                <select name="hypertension" id="hypertension" required>
                    <option value="0">No (0)</option>
                    <option value="1">Yes (1)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="heart_disease">Heart Disease</label>
                <select name="heart_disease" id="heart_disease" required>
                    <option value="0">No (0)</option>
                    <option value="1">Yes (1)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="ever_married">Ever Married?</label>
                <select name="ever_married" id="ever_married" required>
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                </select>
            </div>

            <div class="form-group">
                <label for="work_type">Work Type</label>
                <select name="work_type" id="work_type" required>
                    <option value="Private">Private</option>
                    <option value="Self-employed">Self-employed</option>
                    <option value="Govt_job">Government Job</option>
                    <option value="children">Children</option>
                    <option value="Never_worked">Never Worked</option>
                </select>
            </div>

            <div class="form-group">
                <label for="residence_type">Residence Type</label>
                <select name="residence_type" id="residence_type" required>
                    <option value="Urban">Urban</option>
                    <option value="Rural">Rural</option>
                </select>
            </div>

            <div class="form-group">
                <label for="smoking_status">Smoking Status</label>
                <select name="smoking_status" id="smoking_status" required>
                    <option value="never smoked">Never Smoked</option>
                    <option value="formerly smoked">Formerly Smoked</option>
                    <option value="smokes">Smokes</option>
                    <option value="Unknown">Unknown</option>
                </select>
            </div>

            <div class="form-group full-width">
                <button type="submit" class="btn-submit">Predict Stroke Risk</button>
            </div>
        </div>
    </form>

    <div class="footer">
        <p>Built with Flask & XGBoost | <a href="https://github.com/CarlosRoa76/Data-Science-Project-Stroke-Prediction-" target="_blank">View on GitHub</a></p>
    </div>
</div>

</body>
</html>
